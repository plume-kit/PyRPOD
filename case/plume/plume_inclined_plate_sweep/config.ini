# Cai 2016 inclined-plate SWEEP case (Aerospace 3(4):43, Section 4): the
# paper's 60 deg 8 m x 8 m plate (argon round jet, D = 1 m, S0 = 2.0, T0 =
# 200 K, Tw = 300 K, fully diffuse), swept over 19 approach angles x 5
# stand-off distances (95 firings; jfh_inclined_plate_sweep.A). Driven by
# scripts/inclined_plate_sweep_study.py, which writes per-pose strikes to
# results/strikes/firing-<i>.vtu. Geometry assets are generated by the
# scripts in stl/ and jfh/ (see their docstrings). The single paper pose
# lives in the sibling case plume_inclined_plate (rpod_integration_test_07);
# the flat-plate reframing in plume_flat_plate_sweep (rpod_verification_test_06).

# Visiting Vehicle for RPOD analysis
[vv]
stl_lm = cylinder_transformed.stl
stl_thruster = mold_funnel_transformed.stl

# Target Vehicle for RPOD analysis
[tv]
stl = inclined_plate_transformed.stl

# surface wall temperature (Kelvin): Tw/T0 = 1.5 (paper Figs. 17-21)
surface_temp = 300

# proportion of diffuse particle reflections [0, 1]
sigma = 1

# check plume constraints? 0 or 1
check_constraints = 0

# max heat flux integral (J/m^2)
heat_flux_load = inf
heat_flux_window_size = 1

# max heat flux rate (W/m^2)
heat_flux = inf

# max pressure load
normal_pressure_load = inf
normal_pressure_window_size = inf

# max normal pressure (N/m^2)
normal_pressure = inf

# max shear pressure (N/m^2)
shear_pressure = inf

# Plume kinetics and interactions models
[pm]
# Gas kinetics model
kinetics = Simplified

# Gas-surface interaction model
surface_interaction = Maxwellian

# Jet Firing History
[jfh]
jfh = jfh_inclined_plate_sweep.A

# Thruster configuration data.
[tcd]
# Thruster Configuration File - single head-on thruster, no cant.
tcf = tcf_1_argon.txt

# Thruster Definition File - argon at the paper conditions.
tdf = tdf.csv

# Parameters for scaling plume geometry.
[plume]
radius = 25
# ~89 deg: the default 0.436 (25 deg) would clip the plate -- its lower
# corners sit ~70 deg off-axis at the paper distance. 1.55 rad keeps the
# gating wedge clear of the whole plate at every sweep pose.
wedge_theta = 1.55
